        :root{--black:#000;--dark:#0a0a0a;--dark-2:#111;--dark-3:#1a1a1a;--gold:#d4a846;--gold-light:#f0d078;--gold-dark:#b8922e;--amber:#ffb800;--white:#fff;--cream:#faf6ed;--text-muted:#999;--radius:16px;--radius-lg:24px;--shadow-gold:0 0 60px rgba(212,168,70,.15);--transition:all .4s cubic-bezier(.25,.46,.45,.94)}

        /* PAGE HERO */
        .page-hero{padding:10rem 2rem 5rem;background:var(--dark);position:relative;overflow:hidden}

        /* CONTACT GRID */
        .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}

        .contact-card:hover{border-color:rgba(212,168,70,.15)}
        .contact-card-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--amber));display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:1.5rem;box-shadow:0 8px 24px rgba(212,168,70,.2)}
        .contact-card h3{color:var(--white);font-size:1.3rem;margin-bottom:.5rem}
        .contact-detail{display:flex;align-items:center;gap:.8rem;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
        .contact-detail:last-child{border:none}
        .contact-detail-icon{color:var(--gold);font-size:1.1rem;width:24px;text-align:center}
        .contact-detail a{color:var(--white);transition:var(--transition)}.contact-detail a:hover{color:var(--gold)}
        .contact-detail span{color:var(--text-muted);font-size:.95rem}

        /* ORARI */
        .orari-table{width:100%;margin-top:1.5rem}

        .orari-day{font-weight:600;color:var(--white)}.orari-time{color:var(--gold);font-weight:500}
        .orari-closed{color:#ef4444;font-weight:600}

        /* MAP */
        .map-container{border-radius:var(--radius-lg);overflow:hidden;aspect-ratio:16/9;border:1px solid rgba(255,255,255,.06)}

        .directions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3rem}

        .direction-card:hover{border-color:rgba(212,168,70,.2);transform:translateY(-4px)}
        .direction-icon{font-size:2.5rem;margin-bottom:1rem}
        .direction-card h3{color:var(--white);font-size:1rem}

        .reveal{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.25,.46,.45,.94),transform .8s cubic-bezier(.25,.46,.45,.94)}.reveal.visible{opacity:1;transform:translateY(0)}.reveal-delay-1{transition-delay:.1s}.reveal-delay-2{transition-delay:.2s}.reveal-delay-3{transition-delay:.3s}
